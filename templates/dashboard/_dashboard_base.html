{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{% block page_header %}Dashboard{% endblock %}</h1>
</div>

<div class="card mb-4">
    <div class="card-header">
        <i class="icon cil-filter"></i> Filters
    </div>
    <div class="card-body">
        <form method="get" action="" class="row g-3 align-items-center">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="icon cil-search"></i></span>
                    <input type="text" name="q" id="q" class="form-control" placeholder="Search activities..." value="{{ request.GET.q }}">
                </div>
            </div>
            <div class="col-md-2">
                <select name="status" id="status" class="form-select">
                    <option value="">-- Status --</option>
                    {% for status in statuses %}
                        <option value="{{ status.pk }}" {% if request.GET.status == status.pk|stringformat:"s" %}selected{% endif %}>{{ status.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <select name="activity_type" id="activity_type" class="form-select">
                    <option value="">-- Activity Type --</option>
                    {% for at in activity_types %}
                        <option value="{{ at.pk }}" {% if request.GET.activity_type == at.pk|stringformat:"s" %}selected{% endif %}>{{ at.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <select name="assignee" id="assignee" class="form-select">
                    <option value="">-- Assignee --</option>
                    {% for assignee in assignees %}
                        <option value="{{ assignee.pk }}" {% if request.GET.assignee == assignee.pk|stringformat:"s" %}selected{% endif %}>{{ assignee.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Filter</button>
            </div>
        </form>
    </div>
</div>

<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.view_name == 'dashboard:dashboard' %}active{% endif %}" href="{% url 'dashboard:dashboard' %}">Dashboard</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.view_name == 'reports:daily_report' %}active{% endif %}" href="{% url 'reports:daily_report' %}">Daily Report</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.view_name == 'reports:weekly_report' %}active{% endif %}" href="{% url 'reports:weekly_report' %}">Weekly Report</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.view_name == 'reports:monthly_report' %}active{% endif %}" href="{% url 'reports:monthly_report' %}">Monthly Report</a>
    </li>
</ul>

<div class="row">
    <div class="col-md-8">
        {% block dashboard_content %}{% endblock %}
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <i class="icon cil-chart-pie"></i> Activity Status
            </div>
            <div class="card-body">
                <canvas id="statusPieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('statusPieChart');
    if (ctx) {
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: {{ pie_chart_labels|safe }},
                datasets: [{
                    label: '# of Activities',
                    data: {{ pie_chart_data|safe }},
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    title: {
                        display: true,
                        text: 'Activity Status Distribution'
                    }
                }
            }
        });
    }
</script>
{% endblock %}
