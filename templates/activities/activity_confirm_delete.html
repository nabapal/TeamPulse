{% extends 'base.html' %}

{% block content %}
  <h2>Delete Activity</h2>
  <p>Are you sure you want to delete "{{ object }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm</button>
    <a href="{% url 'activities:activity_list' %}">Cancel</a>
  </form>
{% endblock %}
