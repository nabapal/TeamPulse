{% extends 'base.html' %}
{% load activity_tags %}

{% block content %}
<div class="card">
  <div class="card-header">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Activities</h2>
        <a href="{% url 'activities:activity_add' %}" class="btn btn-primary">Add Activity</a>
    </div>
  </div>
  <div class="card-body">
    <table class="table table-striped">
    <thead>
      <tr>
        <th>Description</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for activity in activities %}
        <tr>
          <td>{{ activity.description|truncatewords:20 }}</td>
          <td><span class="badge bg-{{ activity.status.name|status_color }}">{{ activity.status.name }}</span></td>
          <td>
            <a href="{% url 'activities:activity_detail' activity.pk %}" class="btn btn-info btn-sm">View</a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3">No activities yet.</td>
        </tr>
      {% endfor %}
    </tbody>
    </table>
  </div>
</div>
{% endblock %}
