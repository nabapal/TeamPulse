{% extends 'base.html' %}

{% block content %}
  <h2>Password Reset</h2>
  <p>Please enter your email address to receive a link to reset your password.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
  </form>
{% endblock %}
