{% extends 'base.html' %}

{% block content %}
  <h2>Approve New Users</h2>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users_to_approve %}
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.get_role_display }}</td>
          <td>
            <a href="{% url 'approve_user' user.pk %}" class="btn btn-success btn-sm">Approve</a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="4">No users to approve.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
